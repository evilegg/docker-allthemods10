# pack.conf — fork-time identity for this modpack
#
# When forking this template for a new pack, update these four values.
# Everything else (Makefile, Dockerfile, launch.sh) works without changes.
#
# PACK_SLUG    — CurseForge URL slug (curseforge.com/minecraft/modpacks/<slug>)
# IMAGE        — Docker image name for the runtime container
# IMAGE_DATA   — Docker image name for the data init container
# JAVA_VERSION — Java major version required by this modpack (17 or 21)

PACK_SLUG    := all-the-mods-10
IMAGE        := evilegg/all-the-mods
IMAGE_DATA   := evilegg/all-the-mods-data
JAVA_VERSION := 21
