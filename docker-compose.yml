# docker-compose.yml
#
# Image names and tag are read from .env, generated by `make compose-env`.
# Run `make compose-env` once after building, then `docker compose up`.
#
# Usage:
#   make && make compose-env          # build images and write .env
#   EULA=true docker compose up       # seeds volume on first run, then starts server
#   docker compose down        # stop (volume persists)
#   docker compose down -v     # stop and wipe world data

services:
  init:
    image: ${IMAGE_DATA}:${TAG}
    # Run as minecraft user (uid 99 / gid 100) so copied files are writable
    # by the server container running under the same user.
    user: "99:100"
    volumes:
      - data:/data
    # Idempotent: only copies server files if libraries/ is absent.
    command: ["sh", "-c", "[ -d /data/libraries ] && echo 'Volume already seeded, skipping.' || { echo 'Seeding volume...'; cp -r /opt/server/. /data/; echo 'Done.'; }"]

  server:
    image: ${IMAGE}:${TAG}
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - data:/data
    ports:
      - "25565:25565"
    environment:
      EULA: ${EULA:?EULA must be set to 'true' to accept the Minecraft EULA}
      JVM_OPTS: ${JVM_OPTS:-}
      MOTD: ${MOTD:-}
      ALLOW_FLIGHT: ${ALLOW_FLIGHT:-}
      MAX_PLAYERS: ${MAX_PLAYERS:-}
      ONLINE_MODE: ${ONLINE_MODE:-}
      ENABLE_WHITELIST: ${ENABLE_WHITELIST:-}
      WHITELIST_USERS: ${WHITELIST_USERS:-}
      OP_USERS: ${OP_USERS:-}
    restart: unless-stopped

volumes:
  data:
