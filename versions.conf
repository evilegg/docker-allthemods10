# ATM10 version registry
#
# To add a new release, append a line below and `make` picks it up automatically.
# The last non-comment line becomes the default for `make` / `make dist`.
#
# Columns (whitespace-separated):
#   make-target   server-version   server-pack-file-id   neoforge-version   download-url
#
# The file ID is for the SERVER PACK, not the client pack — they differ on CurseForge.
# Find the server pack file ID via the CurseForge API:
#   curl -s -H "x-api-key: $CURSEFORGE_API_KEY" \
#     "https://api.curseforge.com/v1/mods/<modId>/files/<clientFileId>" \
#     | python3 -c "import sys,json; d=json.load(sys.stdin)['data']; print(d.get('serverPackFileId'))"
#
# NeoForge versions:
#   https://maven.neoforged.net/#releases/net/neoforged/neoforge

